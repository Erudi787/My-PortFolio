<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">
    AWS Architecture — rmmd-podcast
  </text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#64748b">
    326 static pages · daily auto-rebuild · multi-source per-episode thumbnail resolution
  </text>

  <!-- ═══ Row 1: Daily Ingestion ═══ -->
  <text x="40" y="100" font-size="12" font-weight="700" letter-spacing="2" fill="#dc2626">① DAILY INGESTION — 14:00 UTC</text>
  <line x1="40" y1="108" x2="1160" y2="108" stroke="#e2e8f0" stroke-width="1"/>

  <!-- EventBridge cron -->
  <rect x="40" y="130" width="160" height="64" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="153" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">EventBridge</text>
  <text x="120" y="172" text-anchor="middle" font-size="11" fill="#92400e">daily cron rule</text>
  <text x="120" y="186" text-anchor="middle" font-size="10" fill="#a16207">0 14 * * ? *</text>

  <!-- Megaphone RSS -->
  <rect x="40" y="220" width="160" height="58" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Megaphone RSS</text>
  <text x="120" y="263" text-anchor="middle" font-size="11" fill="#5b21b6">feeds.megaphone.fm</text>

  <!-- IngestRssFn -->
  <rect x="280" y="130" width="180" height="148" rx="10" fill="#fed7aa" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">IngestRssFn</text>
  <text x="370" y="173" text-anchor="middle" font-size="11" fill="#9a3412">Lambda (Node 22)</text>
  <line x1="296" y1="186" x2="444" y2="186" stroke="#fb923c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="370" y="206" text-anchor="middle" font-size="10" fill="#9a3412">• Pull RSS</text>
  <text x="370" y="222" text-anchor="middle" font-size="10" fill="#9a3412">• Parse 326 items</text>
  <text x="370" y="238" text-anchor="middle" font-size="10" fill="#9a3412">• BatchWriteCommand</text>
  <text x="370" y="254" text-anchor="middle" font-size="10" fill="#9a3412">• Read SSM webhook URL</text>
  <text x="370" y="270" text-anchor="middle" font-size="10" fill="#9a3412">• POST to Amplify</text>

  <!-- DynamoDB -->
  <rect x="540" y="130" width="160" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="153" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">DynamoDB</text>
  <text x="620" y="170" text-anchor="middle" font-size="11" fill="#1e40af">EpisodesTable</text>
  <text x="620" y="186" text-anchor="middle" font-size="10" fill="#1d4ed8">PK: id · GSI: ByPubDate</text>

  <!-- SSM Parameter Store -->
  <rect x="540" y="220" width="160" height="58" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="243" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">SSM Parameter Store</text>
  <text x="620" y="262" text-anchor="middle" font-size="10" fill="#92400e">/rmmd-podcast/amplify-</text>
  <text x="620" y="274" text-anchor="middle" font-size="10" fill="#92400e">rebuild-webhook (SecureString)</text>

  <!-- Amplify Webhook -->
  <rect x="780" y="155" width="160" height="64" rx="10" fill="#fed7aa" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="860" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Amplify Webhook</text>
  <text x="860" y="195" text-anchor="middle" font-size="11" fill="#9a3412">webhooks.amplify.aws</text>
  <text x="860" y="211" text-anchor="middle" font-size="10" fill="#9a3412">POST → triggers rebuild</text>

  <!-- Arrows row 1 -->
  <!-- EventBridge → IngestRssFn -->
  <path d="M 200 162 L 280 162" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="240" y="155" text-anchor="middle" font-size="9" fill="#475569">fire</text>

  <!-- Megaphone → IngestRssFn -->
  <path d="M 200 249 Q 240 249 280 220" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="240" y="240" text-anchor="middle" font-size="9" fill="#475569">GET</text>

  <!-- IngestRssFn → DynamoDB (write) -->
  <path d="M 460 162 L 540 162" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="500" y="155" text-anchor="middle" font-size="9" fill="#059669">upsert</text>

  <!-- IngestRssFn → SSM (read) -->
  <path d="M 460 249 L 540 249" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="500" y="242" text-anchor="middle" font-size="9" fill="#475569">read</text>

  <!-- IngestRssFn → Amplify Webhook (POST) -->
  <path d="M 460 200 Q 620 200 780 187" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="700" y="195" text-anchor="middle" font-size="9" fill="#475569">POST</text>

  <!-- ═══ Vertical: webhook triggers build ═══ -->
  <path d="M 860 219 L 860 310" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>
  <text x="877" y="265" font-size="10" font-style="italic" fill="#475569">triggers</text>
  <text x="877" y="278" font-size="10" font-style="italic" fill="#475569">rebuild</text>

  <!-- ═══ Row 2: Build Time ═══ -->
  <text x="40" y="335" font-size="12" font-weight="700" letter-spacing="2" fill="#2563eb">② BUILD-TIME — Astro SSG on Amplify Hosting</text>
  <line x1="40" y1="343" x2="1160" y2="343" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Astro Build (center) -->
  <rect x="440" y="370" width="320" height="180" rx="14" fill="#fed7aa" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="396" text-anchor="middle" font-size="15" font-weight="700" fill="#9a3412">Astro SSG Build</text>
  <text x="600" y="414" text-anchor="middle" font-size="11" fill="#9a3412">Amplify Hosting · Node 22 · pnpm</text>
  <line x1="460" y1="424" x2="740" y2="424" stroke="#fb923c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="600" y="446" text-anchor="middle" font-size="11" fill="#9a3412">getStaticPaths() fetches data from</text>
  <text x="600" y="462" text-anchor="middle" font-size="11" fill="#9a3412">5 external sources in parallel</text>
  <text x="600" y="486" text-anchor="middle" font-size="13" font-weight="600" fill="#7c2d12">↓</text>
  <text x="600" y="510" text-anchor="middle" font-size="12" font-weight="600" fill="#7c2d12">326 static HTML pages</text>
  <text x="600" y="528" text-anchor="middle" font-size="11" fill="#9a3412">+ assets · ~1m 40s build</text>

  <!-- Our API (left) -->
  <rect x="120" y="370" width="200" height="100" rx="10" fill="#fed7aa" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Our HTTP API</text>
  <text x="220" y="412" text-anchor="middle" font-size="10" fill="#9a3412">API Gateway · CORS</text>
  <line x1="140" y1="421" x2="300" y2="421" stroke="#fb923c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="220" y="438" text-anchor="middle" font-size="10" fill="#9a3412">GET /episodes</text>
  <text x="220" y="452" text-anchor="middle" font-size="10" fill="#9a3412">GET /episodes/{id}</text>
  <text x="220" y="466" text-anchor="middle" font-size="9" fill="#a16207">List/Get Lambdas → DDB</text>

  <!-- 5 external API icons (right of Astro) -->
  <g transform="translate(810, 370)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="140" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">External APIs (per build)</text>

    <!-- YouTube -->
    <rect x="14" y="36" width="124" height="26" rx="4" fill="#fee2e2"/>
    <circle cx="28" cy="49" r="6" fill="#dc2626"/>
    <polygon points="25,46 33,49 25,52" fill="#fff"/>
    <text x="42" y="53" font-size="10" font-weight="600" fill="#991b1b">YouTube Data API v3</text>

    <!-- Spotify Web -->
    <rect x="142" y="36" width="124" height="26" rx="4" fill="#dcfce7"/>
    <circle cx="156" cy="49" r="6" fill="#16a34a"/>
    <text x="170" y="53" font-size="10" font-weight="600" fill="#14532d">Spotify Web API</text>

    <!-- Spotify Embed -->
    <rect x="14" y="68" width="124" height="26" rx="4" fill="#dcfce7"/>
    <circle cx="28" cy="81" r="6" fill="#16a34a"/>
    <text x="42" y="85" font-size="10" font-weight="600" fill="#14532d">Spotify Embed scrape</text>

    <!-- Apple iTunes -->
    <rect x="142" y="68" width="124" height="26" rx="4" fill="#f1f5f9"/>
    <circle cx="156" cy="81" r="6" fill="#475569"/>
    <text x="170" y="85" font-size="10" font-weight="600" fill="#1e293b">Apple iTunes Lookup</text>

    <!-- Substack RSS -->
    <rect x="14" y="100" width="124" height="26" rx="4" fill="#fed7aa"/>
    <circle cx="28" cy="113" r="6" fill="#ea580c"/>
    <text x="42" y="117" font-size="10" font-weight="600" fill="#7c2d12">Substack RSS</text>

    <!-- Megaphone RSS already shown row 1 -->
    <rect x="142" y="100" width="124" height="26" rx="4" fill="#ede9fe"/>
    <circle cx="156" cy="113" r="6" fill="#7c3aed"/>
    <text x="170" y="117" font-size="10" font-weight="600" fill="#5b21b6">(via DynamoDB)</text>

    <!-- Resolution chain note -->
    <line x1="14" y1="138" x2="266" y2="138" stroke="#cbd5e1" stroke-width="1"/>
    <text x="140" y="155" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">Per-episode thumbnail chain (5-tier)</text>
    <text x="140" y="170" text-anchor="middle" font-size="9" fill="#64748b">YT → Spotify API → RSS → Embed → cover</text>
  </g>

  <!-- Astro ← Our API arrow -->
  <path d="M 320 420 L 440 420" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="380" y="412" text-anchor="middle" font-size="9" fill="#2563eb">fetch</text>

  <!-- Astro ← External APIs arrow -->
  <path d="M 810 460 L 760 460" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="785" y="453" text-anchor="middle" font-size="9" fill="#2563eb">parallel</text>

  <!-- API ← DynamoDB query (small arrow on left side) -->
  <path d="M 540 162 Q 540 240 320 420" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.55"/>
  <text x="380" y="338" text-anchor="middle" font-size="9" font-style="italic" fill="#059669">(API → DDB → API → Astro)</text>

  <!-- ═══ Row 3: Edge Serving ═══ -->
  <text x="40" y="595" font-size="12" font-weight="700" letter-spacing="2" fill="#059669">③ EDGE SERVING</text>
  <line x1="40" y1="603" x2="1160" y2="603" stroke="#e2e8f0" stroke-width="1"/>

  <!-- CloudFront -->
  <rect x="280" y="625" width="200" height="64" rx="10" fill="#fed7aa" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="649" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">CloudFront CDN</text>
  <text x="380" y="666" text-anchor="middle" font-size="11" fill="#9a3412">(Amplify-managed)</text>
  <text x="380" y="681" text-anchor="middle" font-size="10" fill="#a16207">global edge cache</text>

  <!-- Cloudflare DNS -->
  <rect x="540" y="625" width="200" height="64" rx="10" fill="#fed7aa" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="649" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Cloudflare DNS</text>
  <text x="640" y="666" text-anchor="middle" font-size="11" fill="#92400e">DNS-only (gray cloud)</text>
  <text x="640" y="681" text-anchor="middle" font-size="10" fill="#a16207">CNAME → Amplify</text>

  <!-- User browser -->
  <rect x="800" y="625" width="200" height="64" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="900" y="649" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">User Browser</text>
  <text x="900" y="666" text-anchor="middle" font-size="11" fill="#334155">podcast.renamalikmd.com</text>
  <text x="900" y="681" text-anchor="middle" font-size="10" fill="#64748b">(plus podcast-new — staging)</text>

  <!-- Arrows row 3 -->
  <path d="M 600 550 L 380 625" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="475" y="582" text-anchor="middle" font-size="9" fill="#059669">deploy</text>

  <path d="M 480 657 L 540 657" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M 740 657 L 800 657" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Legend at bottom -->
  <g transform="translate(40, 720)">
    <text x="0" y="14" font-size="11" font-weight="700" fill="#1e293b">LEGEND</text>
    <line x1="60" y1="9" x2="900" y2="9" stroke="#e2e8f0" stroke-width="1"/>

    <rect x="0" y="28" width="18" height="14" rx="3" fill="#fed7aa" stroke="#f97316"/>
    <text x="24" y="40" font-size="11" fill="#475569">AWS service</text>

    <rect x="130" y="28" width="18" height="14" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="154" y="40" font-size="11" fill="#475569">AWS-related (cron / SSM / DNS / webhook)</text>

    <rect x="430" y="28" width="18" height="14" rx="3" fill="#dbeafe" stroke="#2563eb"/>
    <text x="454" y="40" font-size="11" fill="#475569">Datastore</text>

    <rect x="540" y="28" width="18" height="14" rx="3" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="564" y="40" font-size="11" fill="#475569">External source</text>

    <rect x="680" y="28" width="18" height="14" rx="3" fill="#f1f5f9" stroke="#64748b"/>
    <text x="704" y="40" font-size="11" fill="#475569">Client / browser</text>

    <text x="820" y="40" font-size="11" fill="#475569">— solid arrow: data flow</text>
    <text x="820" y="58" font-size="11" fill="#475569">- - dashed: trigger / control flow</text>
  </g>

  <!-- Footnote -->
  <text x="600" y="800" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">
    Cost: stays inside Amplify Hosting + Lambda + DynamoDB free tiers · ~30 builds/month from cron · ~$0/mo steady-state
  </text>
</svg>
